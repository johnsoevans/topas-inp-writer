name: Release on VERSION bump

on:
  push:
    branches: [master]
    paths: [VERSION]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(tr -d '[:space:]' < VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check tag doesn't already exist
        id: check
        run: |
          if git rev-parse "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract changelog entry
        id: changelog
        if: steps.check.outputs.exists == 'false'
        run: |
          awk '/^## /{if (found) exit; found=1; next} found' CHANGELOG.md > /tmp/notes.md
          if [ ! -s /tmp/notes.md ]; then
            echo "Release v${{ steps.version.outputs.version }}" > /tmp/notes.md
          fi

      - name: Build skill-only zip
        if: steps.check.outputs.exists == 'false'
        run: |
          mkdir /tmp/topas-inp-writer
          rsync -a --exclude-from='.github/release-exclude.txt' ./ /tmp/topas-inp-writer/
          cd /tmp
          zip -r topas-inp-writer.zip topas-inp-writer

      - name: Tag and release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file /tmp/notes.md \
            /tmp/topas-inp-writer.zip
